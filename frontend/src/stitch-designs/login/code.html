<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connexion - DocPilot AI</title>
<!-- BEGIN: Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CDN -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="page-background">
    /* Creates the diagonal split background effect */
    .diagonal-split-bg {
      background: linear-gradient(135deg, #0f172a 50%, #020617 50%);
    }
    
    /* Custom glow animation for the card */
    @keyframes subtle-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }
      50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }
    }
    .glowing-card {
      animation: subtle-glow 4s infinite ease-in-out;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="diagonal-split-bg min-h-screen flex flex-col items-center justify-center p-4 font-sans text-slate-200 antialiased">
<!-- BEGIN: Main Login Container -->
<main class="w-full max-w-md" data-purpose="login-container">
<!-- Login Card -->
<div class="glowing-card bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-2xl p-8 shadow-2xl relative overflow-hidden" data-purpose="login-card">
<!-- Decorative top highlight -->
<!-- BEGIN: Card Header -->
<header class="flex flex-col items-center mb-8" data-purpose="card-header">
<div class="mb-4 flex flex-col items-center">
<svg fill="none" height="64" stroke="#22d3ee" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" style="filter: drop-shadow(0 0 8px #22d3ee); stroke: #22d3ee;" viewbox="0 0 24 24" width="64">
<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
<polyline points="14 2 14 8 20 8"></polyline>
<line x1="16" x2="8" y1="13" y2="13"></line>
<line x1="16" x2="8" y1="17" y2="17"></line>
<polyline points="10 9 9 9 8 9"></polyline>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">DocPilot AI</h1>
<p class="text-sm text-slate-400 text-center px-4">Votre plateforme d'intelligence documentaire SaaS</p>
</header>
<!-- END: Card Header -->
<!-- BEGIN: Error Message -->
<!-- Displayed when login fails -->
<div class="mb-6 p-3 bg-red-900/30 border border-red-500/50 rounded-lg flex items-center space-x-3 text-red-400" data-purpose="error-alert" role="alert">
<svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-sm font-medium">Identifiants invalides</span>
</div>
<!-- END: Error Message -->
<!-- BEGIN: Login Form -->
<form action="#" class="space-y-5" data-purpose="login-form" method="POST">
<div>
<input autocomplete="email" class="block w-full px-4 bg-white/5 border border-indigo-500/40 rounded-lg py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" id="email" name="email" placeholder="Email" required="" type="email"/>
</div>
<div>
<input autocomplete="current-password" class="block w-full px-4 bg-white/5 border border-indigo-500/40 rounded-lg py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" id="password" name="password" placeholder="Mot de passe" required="" type="password"/>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-blue-500 transition-all duration-200 ease-in-out transform hover:-translate-y-0.5" data-purpose="submit-button" style="background: linear-gradient(to right, #4A5DF1, #2B1676);" type="submit">
            Se connecter
          </button>
</div>
</form>
<!-- END: Login Form -->
<!-- BEGIN: Action Links -->
<div class="mt-6 flex flex-col items-center space-y-3 text-sm" data-purpose="form-actions">
<a class="font-medium text-slate-300 hover:text-white transition-colors" href="#">Mot de passe oublié ?</a>
<a class="font-medium text-slate-300 hover:text-white transition-colors" href="#">Créer un compte</a>
</div>
<!-- END: Action Links -->
</div>
<!-- BEGIN: Footer Information -->
<div class="mt-8 text-center" data-purpose="demo-credentials">
<p class="text-xs text-slate-400 font-mono">
        Demo: demo@docpilot.ai / Password123
      </p>
</div>
<!-- END: Footer Information -->
</main>
<!-- END: Main Login Container -->
</body></html>
